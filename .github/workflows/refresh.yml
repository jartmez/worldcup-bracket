name: refresh matches

on:
  schedule:
    # Every 30 minutes between 11:00 and 23:59 UTC (typical WC match window).
    - cron: "*/30 11-23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Fetch latest matches from football-data.org
        env:
          FOOTBALL_DATA_KEY: ${{ secrets.FOOTBALL_DATA_KEY }}
        run: node scripts/refresh-matches.js

      - name: Commit updated snapshot
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/matches.json
          if git diff --cached --quiet; then
            echo 'No changes to commit'
            exit 0
          fi
          git commit -m "chore: refresh matches $(date -u +%FT%TZ)"
          git push
