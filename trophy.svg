<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 190" role="img" aria-label="FIFA World Cup trophy">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbe9a8"/>
      <stop offset="0.35" stop-color="#f2c14e"/>
      <stop offset="0.7" stop-color="#d99a2b"/>
      <stop offset="1" stop-color="#a9711a"/>
    </linearGradient>
    <linearGradient id="goldHi" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff4cf"/>
      <stop offset="1" stop-color="#e0a834"/>
    </linearGradient>
    <linearGradient id="malachite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2f9e6f"/>
      <stop offset="1" stop-color="#166a45"/>
    </linearGradient>
  </defs>

  <!-- base bands (malachite green + gold rims) -->
  <path d="M38 176 L82 176 L86 188 L34 188 Z" fill="url(#malachite)" stroke="#0e4e30" stroke-width="1"/>
  <rect x="36" y="170" width="48" height="7" rx="2" fill="url(#gold)"/>
  <rect x="40" y="161" width="40" height="7" rx="2" fill="url(#gold)"/>

  <!-- trophy body: two figures spiralling up to hold the globe -->
  <path d="M60 66
           C 44 74, 40 96, 46 118
           C 50 134, 46 150, 40 161
           L 80 161
           C 74 150, 70 134, 74 118
           C 80 96, 76 74, 60 66 Z"
        fill="url(#gold)" stroke="#8a5c14" stroke-width="1.2"/>
  <!-- inner sculpt highlight -->
  <path d="M60 72 C 52 82, 51 104, 56 126 C 59 140, 57 152, 54 159"
        fill="none" stroke="#fff2c8" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <path d="M60 72 C 68 82, 69 104, 64 126 C 61 140, 63 152, 66 159"
        fill="none" stroke="#7c5212" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>

  <!-- globe held aloft -->
  <circle cx="60" cy="42" r="30" fill="url(#gold)" stroke="#8a5c14" stroke-width="1.4"/>
  <ellipse cx="50" cy="32" rx="10" ry="7" fill="url(#goldHi)" opacity="0.75"/>
  <!-- continents / meridian suggestion -->
  <path d="M40 44 C 50 40, 58 48, 70 44" fill="none" stroke="#8a5c14" stroke-width="1.6" opacity="0.6"/>
  <path d="M44 54 C 54 52, 64 58, 74 52" fill="none" stroke="#8a5c14" stroke-width="1.4" opacity="0.5"/>
  <path d="M60 13 C 74 22, 74 62, 60 71" fill="none" stroke="#8a5c14" stroke-width="1.2" opacity="0.4"/>
</svg>
