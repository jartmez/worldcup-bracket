<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>2026 World Cup Knockouts</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="alternate icon" type="image/png" href="favicon.png" />
    <meta name="theme-color" content="#0b0d10" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <h1 class="title">
          <span class="title-main"><span class="yr">2026</span> WORLD CUP</span>
          <span class="title-sub">GORIBELICOS</span>
        </h1>
        <div class="header-meta">
          <span
            class="live-status on"
            id="live-status"
            title="Live data, auto-updating"
          >
            <span class="live-dot" id="live-dot"></span>
            <span class="live-label" id="live-label">LIVE</span>
          </span>
        </div>
      </div>
      <div class="badges">
        <div class="stat" id="stat-matches" title="Matches played">
          <span class="stat-bar"
            ><span class="stat-fill" id="matches-fill"></span
          ></span>
          <span class="stat-txt" id="matches-txt">—</span>
        </div>
        <div class="stat" id="stat-teams" title="Teams still in the tournament">
          <span class="stat-bar"
            ><span class="stat-fill" id="teams-fill"></span
          ></span>
          <span class="stat-txt" id="teams-txt">—</span>
        </div>
      </div>
    </header>

    <main class="stage">
      <aside id="players-panel" aria-label="Players">
        <h2>Players</h2>
        <div id="players-list"></div>
        <p class="players-note">Teams still alive of 7 picked.</p>
        <div class="today-divider" aria-hidden="true"></div>
        <h2 class="sub-h2">Today</h2>
        <div id="today-list"></div>
        <p class="players-note today-empty" id="today-empty" style="display: none">No games today</p>
      </aside>

      <aside id="odds-panel" aria-label="Title odds">
        <h2>Title odds</h2>
        <div id="odds-tables"></div>
        <div id="odds-legend" class="odds-legend" style="display: none">
          <div class="lg-row">
            <svg
              class="lg-mk"
              width="13"
              height="13"
              viewBox="0 0 16 16"
              aria-hidden="true"
            >
              <line
                x1="8"
                y1="2"
                x2="8"
                y2="14"
                stroke="#2ee6a6"
                stroke-width="1.7"
              />
              <rect
                x="4.3"
                y="5.5"
                width="7.4"
                height="6"
                rx="1"
                fill="#2ee6a6"
              />
            </svg>
            <span><b>Poly</b> live market odds</span>
          </div>
          <div class="lg-row">
            <svg
              class="lg-mk"
              width="13"
              height="13"
              viewBox="0 0 16 16"
              aria-hidden="true"
            >
              <path
                d="M2 13.5 C5 13.5 5 4 8 4 C11 4 11 13.5 14 13.5"
                fill="none"
                stroke="#e0b04d"
                stroke-width="1.7"
                stroke-linecap="round"
              />
            </svg>
            <span><b>Elo</b> model estimate (fallback)</span>
          </div>
          <p class="lg-note">
            Match % is derived from each team's Polymarket exit-round prices,
            not a direct head-to-head market.
          </p>
        </div>
      </aside>

      <svg
        id="bracket"
        viewBox="0 0 1000 1000"
        preserveAspectRatio="xMidYMid meet"
        role="img"
        aria-label="Radial knockout bracket, 32 teams converging to a centre trophy"
      >
        <defs id="defs"></defs>
        <g id="connectors"></g>
        <g id="nodes"></g>
        <g id="center"></g>
      </svg>
      <div id="tooltip" class="tooltip" hidden></div>
    </main>

    <aside class="watch-cta" aria-label="Watch live">
      <a class="watch-btn" target="_blank" rel="noopener noreferrer"
         href="https://librepelota.su/es/eventos.html?r=aHR0cHM6Ly92aWR6ZW52aXZvLmNjL2NhbmFsLnBocD9zdHJlYW09dGVsZW11bmRvdXNh">
        <span class="watch-dot" aria-hidden="true"></span>
        <svg class="watch-icon" width="14" height="14" viewBox="0 0 16 16" aria-hidden="true">
          <line x1="3" y1="1.5" x2="5" y2="5" stroke="#0b0d10" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="13" y1="1.5" x2="11" y2="5" stroke="#0b0d10" stroke-width="1.5" stroke-linecap="round"/>
          <rect x="2.5" y="5" width="11" height="7.5" rx="1.2" ry="1.2" fill="none" stroke="#0b0d10" stroke-width="1.5"/>
          <line x1="6.5" y1="14" x2="9.5" y2="14" stroke="#0b0d10" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span class="watch-label">Watch the game</span>
      </a>
    </aside>

    <script src="bracket.js"></script>
    <script src="data.js"></script>
    <script src="elo.js"></script>
    <script src="snapshot.js"></script>
    <script src="results.js"></script>
    <script src="app.js"></script>
  </body>
</html>
