<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>2026 World Cup Knockouts</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="alternate icon" type="image/png" href="favicon.png">
  <meta name="theme-color" content="#0b0d10">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1 class="title">
        <span class="title-main"><span class="yr">2026</span> WORLD CUP</span>
        <span class="title-sub">KNOCKOUTS</span>
      </h1>
      <div class="header-meta">
        <div class="mode-toggle" role="tablist" aria-label="View mode">
          <button class="mode-btn active" id="mode-live" type="button" role="tab" aria-selected="true">Live</button>
          <button class="mode-btn" id="mode-sim" type="button" role="tab" aria-selected="false">Simulate</button>
        </div>
        <span class="live-status on" id="live-status" title="Live data, auto-updating">
          <span class="live-dot" id="live-dot"></span>
          <span class="live-label" id="live-label">LIVE</span>
        </span>
        <span class="sim-status" id="sim-status" title="Simulator — your picks, hypothetical"><span class="sim-dot"></span>SIM</span>
        <button class="reset-btn" id="reset-picks" type="button">Reset picks</button>
        <span class="meta-dot" aria-hidden="true">·</span>
        <span class="credit">By
          <a href="https://x.com/Kryptyk_Skyptyk" target="_blank" rel="noopener noreferrer">Kryptyk-Skyptyk<span class="arw">↗</span></a>
          <a class="credit-gh" href="https://github.com/Kryptyk-Skyptyk" target="_blank" rel="noopener noreferrer" aria-label="Kryptyk-Skyptyk on GitHub" title="GitHub"><svg viewBox="0 0 24 24" width="15" height="15" aria-hidden="true"><path fill="currentColor" d="M12 .5C5.73.5.5 5.73.5 12c0 5.08 3.29 9.39 7.86 10.91.58.11.79-.25.79-.56 0-.28-.01-1.02-.02-2-3.2.7-3.88-1.54-3.88-1.54-.53-1.34-1.29-1.7-1.29-1.7-1.05-.72.08-.71.08-.71 1.16.08 1.77 1.19 1.77 1.19 1.03 1.77 2.7 1.26 3.36.96.1-.75.4-1.26.73-1.55-2.55-.29-5.24-1.28-5.24-5.69 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.46.11-3.05 0 0 .97-.31 3.18 1.18a11.1 11.1 0 0 1 2.9-.39c.98 0 1.97.13 2.9.39 2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.76.11 3.05.74.81 1.19 1.84 1.19 3.1 0 4.42-2.69 5.39-5.25 5.68.41.35.77 1.05.77 2.12 0 1.53-.01 2.76-.01 3.14 0 .31.21.68.8.56C20.71 21.39 24 17.08 24 12 24 5.73 18.27.5 12 .5Z"/></svg></a>
        </span>
      </div>
    </div>
    <div class="badges">
      <div class="stat" id="stat-matches" title="Matches played">
        <span class="stat-bar"><span class="stat-fill" id="matches-fill"></span></span>
        <span class="stat-txt" id="matches-txt">—</span>
      </div>
      <div class="stat" id="stat-teams" title="Teams still in the tournament">
        <span class="stat-bar"><span class="stat-fill" id="teams-fill"></span></span>
        <span class="stat-txt" id="teams-txt">—</span>
      </div>
      <button id="share-btn" class="share-btn" type="button" aria-label="Copy link to this bracket">Share</button>
    </div>
  </header>

  <main class="stage">
    <aside id="odds-panel" aria-label="Title odds">
      <h2>Title odds</h2>
      <p class="odds-note">Loading odds…</p>
      <ol id="odds-list"></ol>
      <div id="odds-legend" class="odds-legend" style="display:none">
        <div class="lg-row">
          <svg class="lg-mk" width="13" height="13" viewBox="0 0 16 16" aria-hidden="true"><line x1="8" y1="2" x2="8" y2="14" stroke="#2ee6a6" stroke-width="1.7"/><rect x="4.3" y="5.5" width="7.4" height="6" rx="1" fill="#2ee6a6"/></svg>
          <span><b>Poly</b> live market odds</span>
        </div>
        <div class="lg-row">
          <svg class="lg-mk" width="13" height="13" viewBox="0 0 16 16" aria-hidden="true"><path d="M2 13.5 C5 13.5 5 4 8 4 C11 4 11 13.5 14 13.5" fill="none" stroke="#e0b04d" stroke-width="1.7" stroke-linecap="round"/></svg>
          <span><b>Elo</b> model estimate (fallback)</span>
        </div>
        <p class="lg-note">Match % is derived from each team's Polymarket exit-round prices, not a direct head-to-head market.</p>
      </div>
    </aside>

    <svg id="bracket" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet"
         role="img" aria-label="Radial knockout bracket, 32 teams converging to a centre trophy">
      <defs id="defs"></defs>
      <g id="connectors"></g>
      <g id="nodes"></g>
      <g id="center"></g>
    </svg>
    <div id="tooltip" class="tooltip" hidden></div>
  </main>

  <script src="bracket.js"></script>
  <script src="data.js"></script>
  <script src="elo.js"></script>
  <script src="snapshot.js"></script>
  <script src="results.js"></script>
  <script src="sim.js"></script>
  <script src="picks.js"></script>
  <script src="app.js"></script>
</body>
</html>
